<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Khitanan</title>

<style>

#musicBtn {
    position: fixed;
    right: 20px;
    bottom: 20px;

    width: 50px;
    height: 50px;

    border: none;
    border-radius: 50%;

    background: #D4AF37;
    cursor: pointer;

    z-index: 9999;
}

body {
    margin: 0;
    padding: 0;
    background: #5B1A1A; /* warna samping */
}

.container {
    max-width: 450px;
    margin: 0 auto;
    background: #5B1A1A;
    min-height: 100vh;
}

img {
    width: 100%;
    display: block;
}

.animate {
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s ease;
}

.animate.show {
    opacity: 1;
    transform: translateY(0);
}

.animate.show {
    opacity: 1;
    transform: translateY(0);
}

.hadiah {
    position: relative;
}

#copyRek {
    position: absolute;

    left: 58%;
    transform: translateX(-50%);

    bottom: 55%;

    width: 35%;
    height: 8%;

    background: transparent;

    border: none;

    cursor: pointer;

    z-index: 999;
}
.countdown-box {
    position: absolute;

    left: 50%;
    transform: translateX(-50%);

    bottom: 38%;

    text-align: center;

    background: rgba(255, 248, 225, 0.9);

    padding: 12px 20px;

    border-radius: 20px;

    color: #5B1A1A;

    width: 75%;
}

.countdown-box p {
    margin: 0 0 10px;
    font-size: 18px;
    font-weight: bold;
}

#countdown {
    font-size: 20px;
    font-weight: bold;
}
.acara {
    position: relative;
}

#lokasiBtn {
    position: absolute;

    left: 50%;
    transform: translateX(-50%);

    bottom: 18%;

    width: 220px;
    height: 50px;

    background: #D4AF37;
    color: #5B1A1A;

    border: none;
    border-radius: 25px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;
}
#bukaUndangan {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 21%;

    padding: 12px 25px;

    border: none;
    border-radius: 10px;

    background: transparent;
    color: transparent;

    cursor: pointer;

    width: 40%;
    height: 5%;
}

#isi-undangan {
    display: none;
}

.cover {
    position: relative;
    width: 100%;
}

.cover img {
    width: 100%;
    display: block;
}

.nama-tamu {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 30%;
    text-align: center;
    width: 70%;
}

.nama-tamu p {
    color: #FFF8E1;
    font-family: serif;
    font-size: 22px;
    margin: 0;
    letter-spacing: 1px;
}

.nama-tamu h2 {
    color: #D4AF37;
    font-family: serif;
    font-size: clamp(28px, 6vw, 40px);
    margin: 8px 0 0 0;
    font-weight: bold;
    line-height: 1.1;
}

        @media (max-width: 400px) {

    .nama-tamu h2 {
        font-size: 30px;
    }

    .countdown-box {
        width: 80%;
        bottom: 32%;
    }

    #copyRek {
        width: 35%;
        bottom: 56%;
    }

}

    </style>

</head>

<body>

<div class="container">


    <div class="cover">
        <img src="images/cover.png" alt="cover">
          
        <div class="nama-tamu">
        <p>Kepada Yth.</p>
        <h2 id="tamu">Tamu Undangan</h2>
</div>

<button id="bukaUndangan">
    📩 Buka Undangan
</button>

<button id="musicBtn">🔊</button>

</div>

<div id="isi-undangan">

    <img src="images/doa.png" class="animate">

    <img src="images/profil.png" class="animate">
    
<div class="acara animate">

    <img src="images/acara.png">

    <button id="lokasiBtn">
        📍 Lihat Lokasi
    </button>

    <div class="countdown-box">
        <p>Menuju Hari Bahagia</p>
        <div id="countdown"></div>
    </div>
</div>
    <img src="images/galeri.png" class="animate">

<div class="hadiah animate">

    <img src="images/hadiah.png">

    <button id="copyRek"></button>

</div>

    <img src="images/penutup.png" class="animate">
    
</div>

<script>
window.onload = function () {

const musik = document.getElementById("musik");
const musicBtn = document.getElementById("musicBtn");

musicBtn.addEventListener("click", function() {

    if (musik.paused) {

        musik.play();
        musicBtn.textContent = "🔊";

    } else {

        musik.pause();
        musicBtn.textContent = "🔇";

    }

});

document.getElementById("copyRek")
.addEventListener("click", function() {

    navigator.clipboard.writeText("6565089122");

    alert("Nomor rekening berhasil disalin!");
});

const targetDate = new Date("2026-06-21T10:00:00").getTime();

function updateCountdown() {

    const now = new Date().getTime();

    const distance = targetDate - now;

    const hari = Math.floor(distance / (1000 * 60 * 60 * 24));

    const jam = Math.floor(
        (distance % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
    );

    const menit = Math.floor(
        (distance % (1000 * 60 * 60))
        / (1000 * 60)
    );

    const detik = Math.floor(
        (distance % (1000 * 60))
        / 1000
    );

    document.getElementById("countdown").innerHTML =
        hari + " Hari " +
        jam + " Jam " +
        menit + " Menit " +
        detik + " Detik";
}

updateCountdown();

setInterval(updateCountdown, 1000);

    document.getElementById("lokasiBtn")
.addEventListener("click", function() {

    window.open(
        "https://www.google.com/maps/place/Rich+%26+Happy+Cell/@-6.158957,106.7421357,21z/data=!4m14!1m7!3m6!1s0x2e69f7f396131d9d:0x6f0957802ae68d20!2sWarung+Bu+Jem!8m2!3d-6.1588618!4d106.7421063!16s%2Fg%2F11sdzf9tbx!3m5!1s0x2e69f7b02fc041ff:0x1e2b975428a99ca8!8m2!3d-6.1589691!4d106.7423662!16s%2Fg%2F11njsl5pfp?entry=ttu&g_ep=EgoyMDI2MDYwMy4xIKXMDSoASAFQAw%3D%3D",
        "_blank"
    );

});

    const params = new URLSearchParams(window.location.search);
    const nama = params.get('to');

    if (nama) {
        document.getElementById('tamu').textContent =
            decodeURIComponent(nama.replace(/\+/g, ' '));
    }

document.getElementById("bukaUndangan")
.addEventListener("click", function() {

    document.getElementById("musik").play();

    musicBtn.textContent = "🔊";

    this.disabled = true;

    const isiUndangan =
        document.getElementById("isi-undangan");

   isiUndangan.style.display = "block";

isiUndangan.scrollIntoView({
    behavior: "smooth"
});

const slides = document.querySelectorAll(".animate");

slides.forEach(function(slide, index) {

    setTimeout(function() {

        slide.classList.add("show");

    }, 800 + (index * 700));

});

    isiUndangan.scrollIntoView({
        behavior: "smooth"
    });

}, { once: true });

};

</script>

</div>

<audio id="musik" loop>
    <source src="backsound.mp3" type="audio/mpeg">
</audio>

</body>
</html>
