<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Khitanan</title>

    <style>
.acara {
    position: relative;
}

#lokasiBtn {
    position: absolute;

    left: 50%;
    transform: translateX(-50%);

    bottom: 12%;

    width: 220px;
    height: 50px;

    background: #D4AF37;
    color: #5B1A1A;

    border: none;
    border-radius: 25px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;
}
#bukaUndangan {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 22%;

    padding: 12px 25px;

    border: none;
    border-radius: 10px;

    background: transparent;
    color: transparent;

    cursor: pointer;

    width: 300px;
    height: 70px;
}

#isi-undangan {
    display: none;
}
.cover {
    position: relative;
    width: 100%;
}

.cover img {
    width: 100%;
    display: block;
}

.nama-tamu {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 31%;
    text-align: center;
    width: 80%;
}

.nama-tamu p {
    color: #FFF8E1;
    font-family: serif;
    font-size: 22px;
    margin: 0;
    letter-spacing: 1px;
}

.nama-tamu h2 {
    color: #D4AF37;
    font-family: serif;
    font-size: 40px;
    margin: 8px 0 0 0;
    font-weight: bold;
    line-height: 1.1;
}
        body {
            margin: 0;
            padding: 0;
            background: #fff;
        }

        img {
            width: 100%;
            display: block;
        }

    </style>
</head>

<body>

<div class="cover">
    <img src="images/cover.png" alt="cover">
          
    <div class="nama-tamu">
    <p>Kepada Yth.</p>
    <h2 id="tamu">Tamu Undangan</h2>
</div>

<button id="bukaUndangan">
    📩 Buka Undangan
</button>

</div>

<div id="isi-undangan">

    <img src="images/doa.png">
    <img src="images/profil.png">
<div class="acara">
    <img src="images/acara.png">

    <button id="lokasiBtn">
        📍 Lihat Lokasi
    </button>
</div>
    <img src="images/galeri.png">
    <img src="images/penutup.png">
    
</div>

<script>
window.onload = function () {
    document.getElementById("lokasiBtn")
.addEventListener("click", function() {

    window.open(
        "https://www.google.com/maps/place/Rich+%26+Happy+Cell/@-6.158957,106.7421357,21z/data=!4m14!1m7!3m6!1s0x2e69f7f396131d9d:0x6f0957802ae68d20!2sWarung+Bu+Jem!8m2!3d-6.1588618!4d106.7421063!16s%2Fg%2F11sdzf9tbx!3m5!1s0x2e69f7b02fc041ff:0x1e2b975428a99ca8!8m2!3d-6.1589691!4d106.7423662!16s%2Fg%2F11njsl5pfp?entry=ttu&g_ep=EgoyMDI2MDYwMy4xIKXMDSoASAFQAw%3D%3D",
        "_blank"
    );

});

    const params = new URLSearchParams(window.location.search);
    const nama = params.get('to');

    if (nama) {
        document.getElementById('tamu').textContent =
            decodeURIComponent(nama.replace(/\+/g, ' '));
    }

    document.getElementById("bukaUndangan")
    .addEventListener("click", function() {

        document.getElementById("isi-undangan")
        .style.display = "block";

        document.getElementById("isi-undangan")
        .scrollIntoView({
            behavior: "smooth"
        });

    });

};
</script>
</body>
</html>
